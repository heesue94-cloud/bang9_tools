<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Maple Party Manager</title>

    <link rel="stylesheet" href="style.css">

    <!-- SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>

</head>

<body>

    <!-- ===========================
        HEADER
    ============================ -->

    <header>

        <div class="logo">

            🍁 Maple Party Manager

        </div>

        <div class="header-menu">

            <select id="bossSelect">

                <option>림보</option>
                <option>세렌</option>
                <option>칼로스</option>
                <option>카링</option>

            </select>

            <button id="saveBtn">

                저장

            </button>

            <button id="resetBtn">

                초기화

            </button>

        </div>

    </header>


    <!-- ===========================
        MAIN
    ============================ -->

    <main>

        <!-- LEFT -->

        <aside id="sidebar">

        </aside>


        <!-- RIGHT -->

        <section id="partyArea">

        </section>

    </main>


    <!-- ===========================
        JAVASCRIPT
    ============================ -->

    <script src="data.js"></script>

    <script src="render.js"></script>

    <script src="drag.js"></script>

    <script src="storage.js"></script>

    <script src="app.js"></script>

</body>

</html>
